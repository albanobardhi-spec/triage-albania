<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIAGE · Discover Albania</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .hero-pattern {
            background-color: #fef2f2;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23e11d48' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .toast {
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translate(-50%, -100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
    </style>
    <script src="js/config.js"></script>      <!-- MUST come first -->
    <script src="js/api-client.js"></script>  <!-- Then this -->
    <script src="js/app.js"></script>         <!-- Then your app -->
</head>
<body class="hero-pattern min-h-screen">

    <!-- Navigation -->
    <nav class="bg-white/90 backdrop-blur-sm shadow-sm fixed w-full z-50">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <span class="text-3xl">🇦🇱</span>
                <span class="font-bold text-xl text-gray-800">TRIAGE</span>
            </div>
            <div id="nav-buttons" class="flex items-center space-x-4">
                <!-- Filled by JavaScript -->
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mx-auto px-4 pt-24 pb-12">
        <div class="text-center mb-12">
            <div class="inline-block bg-white shadow-xl rounded-full p-4 mb-6 border-4 border-red-500">
                <span class="text-7xl">🦅</span>
            </div>
            <h1 class="text-6xl font-black mb-4 bg-gradient-to-r from-red-600 to-black-800 text-transparent bg-clip-text">
                Discover the Land of Eagles
            </h1>
            <p class="text-2xl text-gray-600 max-w-3xl mx-auto mb-8">
                4000 years of history. Untouched nature. Warm hospitality.
                Let TRIAGE guide you through Albania's hidden treasures.
            </p>
            
            <!-- Stats -->
            <div class="flex justify-center space-x-8 mb-12">
                <div class="text-center">
                    <span class="text-3xl font-bold text-red-600" id="visitor-count">12,847</span>
                    <p class="text-gray-500">Happy Travelers</p>
                </div>
                <div class="text-center">
                    <span class="text-3xl font-bold text-red-600" id="heritage-count">24</span>
                    <p class="text-gray-500">Heritage Sites</p>
                </div>
                <div class="text-center">
                    <span class="text-3xl font-bold text-red-600" id="achievement-count">156</span>
                    <p class="text-gray-500">Badges Earned</p>
                </div>
            </div>
            
            <!-- CTA Buttons -->
            <div class="flex flex-wrap gap-4 justify-center">
                <a href="profile.html?kiosk=true" class="bg-gradient-to-r from-red-600 to-red-700 text-white text-xl font-bold py-4 px-10 rounded-full hover:shadow-2xl transition transform hover:scale-105">
                    🏛️ Start Your Journey
                </a>
                <button onclick="playCulturalTip()" class="bg-white text-red-600 text-xl font-bold py-4 px-10 rounded-full hover:shadow-xl transition border-2 border-red-200">
                    🎵 Hear Cultural Tip
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-20 left-1/2 transform -translate-x-1/2 z-50"></div>

    <!-- ==================== SELF-CONTAINED JAVASCRIPT ==================== -->
    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const CONFIG = {
            API_URL: 'https://triage-albania.onrender.com',
            APP_NAME: 'TRIAGE Albania',
            VERSION: '1.0.0'
        };

        // ============================================
        // TOAST SYSTEM
        // ============================================
        const Toast = {
            container: document.getElementById('toast-container'),
            
            show: function(message, type = 'info', duration = 3000) {
                const toast = document.createElement('div');
                const bgColor = type === 'success' ? 'bg-green-600' : 
                               type === 'error' ? 'bg-red-600' : 
                               type === 'warning' ? 'bg-yellow-600' : 'bg-blue-600';
                
                toast.className = `${bgColor} text-white px-6 py-3 rounded-full shadow-2xl mb-3 toast`;
                toast.innerHTML = `
                    <div class="flex items-center">
                        <span class="mr-2">${type === 'success' ? '✅' : 
                                            type === 'error' ? '❌' : 
                                            type === 'warning' ? '⚠️' : 'ℹ️'}</span>
                        <span>${message}</span>
                    </div>
                `;
                
                this.container.appendChild(toast);
                
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transition = 'opacity 0.3s';
                    setTimeout(() => toast.remove(), 300);
                }, duration);
            },
            
            success: function(message) { this.show(message, 'success'); },
            error: function(message) { this.show(message, 'error'); },
            warning: function(message) { this.show(message, 'warning'); },
            info: function(message) { this.show(message, 'info'); }
        };

        // ============================================
        // USER MANAGEMENT
        // ============================================
        const UserManager = {
            currentUser: null,
            token: null,
            
            init: function() {
                try {
                    const savedUser = localStorage.getItem('triage_user');
                    const savedToken = localStorage.getItem('triage_token');
                    
                    if (savedUser && savedToken) {
                        this.currentUser = JSON.parse(savedUser);
                        this.token = savedToken;
                    }
                } catch (e) {
                    console.warn('Failed to load user from storage:', e);
                    this.clear();
                }
                
                this.updateNavigation();
                return this.currentUser;
            },
            
            setUser: function(user, token) {
                this.currentUser = user;
                this.token = token;
                
                try {
                    localStorage.setItem('triage_user', JSON.stringify(user));
                    localStorage.setItem('triage_token', token);
                } catch (e) {
                    console.warn('Failed to save user:', e);
                }
                
                this.updateNavigation();
            },
            
            clear: function() {
                this.currentUser = null;
                this.token = null;
                
                try {
                    localStorage.removeItem('triage_user');
                    localStorage.removeItem('triage_token');
                } catch (e) {
                    console.warn('Failed to clear storage:', e);
                }
                
                this.updateNavigation();
            },
            
            isLoggedIn: function() {
                return !!this.currentUser && !!this.token;
            },
            
            updateNavigation: function() {
                const navButtons = document.getElementById('nav-buttons');
                if (!navButtons) return;
                
                if (this.isLoggedIn()) {
                    navButtons.innerHTML = `
                        <span class="text-gray-600">Welcome, ${this.currentUser.name || 'Traveler'}!</span>
                        <button onclick="handleLogout()" class="text-red-600 hover:text-red-800">Logout</button>
                    `;
                } else {
                    navButtons.innerHTML = `
                        <button onclick="showLoginModal()" class="text-gray-600 hover:text-red-600">Login</button>
                        <button onclick="showRegisterModal()" class="bg-red-600 text-white px-4 py-2 rounded-full text-sm hover:bg-red-700">Sign Up</button>
                    `;
                }
            }
        };

        // ============================================
        // API CLIENT
        // ============================================
        const API = {
            baseUrl: CONFIG.API_URL,
            
            getHeaders: function() {
                const headers = {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                };
                
                if (UserManager.token) {
                    headers['Authorization'] = `Bearer ${UserManager.token}`;
                }
                
                return headers;
            },
            
            request: async function(endpoint, options = {}) {
                const url = `${this.baseUrl}${endpoint}`;
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000); // 10 second timeout
                
                try {
                    const response = await fetch(url, {
                        ...options,
                        headers: { ...this.getHeaders(), ...options.headers },
                        signal: controller.signal,
                        mode: 'cors',
                        credentials: 'include'
                    });
                    
                    clearTimeout(timeoutId);
                    
                    const text = await response.text();
                    let data;
                    
                    try {
                        data = text ? JSON.parse(text) : {};
                    } catch (e) {
                        data = { message: text };
                    }
                    
                    if (!response.ok) {
                        throw new Error(data.error || data.message || `HTTP ${response.status}`);
                    }
                    
                    return data;
                } catch (error) {
                    clearTimeout(timeoutId);
                    
                    if (error.name === 'AbortError') {
                        throw new Error('Request timeout - please check your connection');
                    }
                    
                    throw error;
                }
            },
            
            // Health check
            healthCheck: async function() {
                try {
                    return await this.request('/api/health');
                } catch (error) {
                    console.warn('Health check failed:', error.message);
                    return null;
                }
            },
            
            // Auth endpoints
            login: async function(email, password) {
                return this.request('/api/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ email, password })
                });
            },
            
            register: async function(email, password, name, country) {
                return this.request('/api/auth/register', {
                    method: 'POST',
                    body: JSON.stringify({ email, password, name, country })
                });
            },
            
            getCurrentUser: async function() {
                return this.request('/api/auth/me');
            },
            
            // Feed endpoints
            getFeed: async function(limit = 10) {
                return this.request(`/api/feed?limit=${limit}`);
            }
        };

        // ============================================
        // MODAL MANAGEMENT
        // ============================================
        function createModal(id, title, content) {
            let modal = document.getElementById(id);
            if (modal) return modal;
            
            modal = document.createElement('div');
            modal.id = id;
            modal.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden';
            modal.innerHTML = content;
            document.body.appendChild(modal);
            return modal;
        }

        function showModal(id) {
            const modal = document.getElementById(id);
            if (modal) modal.classList.remove('hidden');
        }

        function hideModal(id) {
            const modal = document.getElementById(id);
            if (modal) modal.classList.add('hidden');
        }

        // Create login modal
        function initModals() {
            // Login modal
            createModal('login-modal', 'Welcome Back', `
                <div class="bg-white rounded-3xl p-8 max-w-md w-full mx-4">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold">Welcome Back</h2>
                        <button onclick="hideModal('login-modal')" class="text-gray-400 hover:text-gray-600 text-2xl">✕</button>
                    </div>
                    <form onsubmit="handleLogin(event)">
                        <div class="mb-4">
                            <label class="block text-sm font-medium mb-2">Email</label>
                            <input type="email" id="login-email" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-300">
                        </div>
                        <div class="mb-6">
                            <label class="block text-sm font-medium mb-2">Password</label>
                            <input type="password" id="login-password" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-300">
                        </div>
                        <button type="submit" class="w-full bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-700 transition">
                            Login
                        </button>
                    </form>
                    <p class="text-center text-sm text-gray-500 mt-4">
                        Don't have an account? 
                        <button onclick="switchToRegister()" class="text-red-600 hover:underline">Sign up</button>
                    </p>
                </div>
            `);

            // Register modal
            createModal('register-modal', 'Join the Adventure', `
                <div class="bg-white rounded-3xl p-8 max-w-md w-full mx-4">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold">Join the Adventure</h2>
                        <button onclick="hideModal('register-modal')" class="text-gray-400 hover:text-gray-600 text-2xl">✕</button>
                    </div>
                    <form onsubmit="handleRegister(event)">
                        <div class="mb-4">
                            <label class="block text-sm font-medium mb-2">Name</label>
                            <input type="text" id="register-name" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-300">
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-medium mb-2">Email</label>
                            <input type="email" id="register-email" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-300">
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-medium mb-2">Country</label>
                            <input type="text" id="register-country" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-300">
                        </div>
                        <div class="mb-6">
                            <label class="block text-sm font-medium mb-2">Password</label>
                            <input type="password" id="register-password" required class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-red-300">
                        </div>
                        <button type="submit" class="w-full bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-700 transition">
                            Create Account
                        </button>
                    </form>
                </div>
            `);
        }

        // ============================================
        // EVENT HANDLERS
        // ============================================
        window.showLoginModal = function() { showModal('login-modal'); };
        window.showRegisterModal = function() { showModal('register-modal'); };
        window.hideModal = hideModal;

        window.switchToRegister = function() {
            hideModal('login-modal');
            showModal('register-modal');
        };

        window.switchToLogin = function() {
            hideModal('register-modal');
            showModal('login-modal');
        };

        window.handleLogin = async function(event) {
            event.preventDefault();
            
            const email = document.getElementById('login-email')?.value;
            const password = document.getElementById('login-password')?.value;
            
            if (!email || !password) {
                Toast.error('Please enter email and password');
                return;
            }
            
            try {
                Toast.info('Logging in...');
                const result = await API.login(email, password);
                
                if (result.success) {
                    UserManager.setUser(result.user, result.token);
                    Toast.success(`Welcome back, ${result.user.name}!`);
                    hideModal('login-modal');
                    
                    // Clear form
                    document.getElementById('login-email').value = '';
                    document.getElementById('login-password').value = '';
                }
            } catch (error) {
                Toast.error(error.message || 'Login failed');
            }
        };

        window.handleRegister = async function(event) {
            event.preventDefault();
            
            const name = document.getElementById('register-name')?.value;
            const email = document.getElementById('register-email')?.value;
            const password = document.getElementById('register-password')?.value;
            const country = document.getElementById('register-country')?.value || '';
            
            if (!name || !email || !password) {
                Toast.error('Please fill all required fields');
                return;
            }
            
            try {
                Toast.info('Creating account...');
                const result = await API.register(email, password, name, country);
                
                if (result.success) {
                    UserManager.setUser(result.user, result.token);
                    Toast.success(`Welcome to TRIAGE, ${result.user.name}!`);
                    hideModal('register-modal');
                    
                    // Clear form
                    document.getElementById('register-name').value = '';
                    document.getElementById('register-email').value = '';
                    document.getElementById('register-password').value = '';
                    document.getElementById('register-country').value = '';
                }
            } catch (error) {
                Toast.error(error.message || 'Registration failed');
            }
        };

        window.handleLogout = function() {
            UserManager.clear();
            Toast.success('Logged out successfully');
        };

        // ============================================
        // VOICE FUNCTIONS
        // ============================================
        window.playCulturalTip = function() {
            if (!window.speechSynthesis) {
                Toast.error('Speech not supported in your browser');
                return;
            }
            
            const tips = [
                'In Albania, nodding your head means "no" and shaking means "yes" - it\'s the opposite of most countries!',
                'Coffee culture is sacred here - never rush a coffee meeting with locals.',
                'When invited to someone\'s home, bring a small gift like sweets or flowers.',
                'The double-headed eagle on the flag represents the north and south of Albania.',
                'Besa is the Albanian code of honor - keeping promises is sacred.'
            ];
            
            const tip = tips[Math.floor(Math.random() * tips.length)];
            const utterance = new SpeechSynthesisUtterance(tip);
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        };

        function playWelcomeGreeting() {
            if (!window.speechSynthesis) return;
            
            const hour = new Date().getHours();
            let greeting = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';
            
            if (UserManager.isLoggedIn()) {
                greeting += `, ${UserManager.currentUser.name}`;
            }
            
            const fullGreeting = `${greeting}! Welcome to TRIAGE Albania, the Land of Eagles.`;
            const utterance = new SpeechSynthesisUtterance(fullGreeting);
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        // ============================================
        // STATS UPDATE
        // ============================================
        async function updateStats() {
            try {
                const health = await API.healthCheck();
                if (health && health.stats) {
                    document.getElementById('visitor-count').textContent = 
                        (12000 + (health.stats.users || 0)).toLocaleString();
                    document.getElementById('heritage-count').textContent = 
                        health.stats.locations || '24';
                    document.getElementById('achievement-count').textContent = 
                        '156'; // Static for now
                }
            } catch (error) {
                console.warn('Failed to update stats:', error);
                // Keep default values
            }
        }

        // ============================================
        // APP INITIALIZATION
        // ============================================
        async function initApp() {
            console.log('🚀 Initializing TRIAGE app...');
            
            try {
                // Initialize modals
                initModals();
                
                // Initialize user manager
                UserManager.init();
                
                // Update stats
                await updateStats();
                
                // Play welcome greeting after 2 seconds
                setTimeout(playWelcomeGreeting, 2000);
                
                console.log('✅ App initialized successfully');
                Toast.success('Welcome to TRIAGE Albania!');
                
            } catch (error) {
                console.error('❌ Initialization error:', error);
                Toast.error('App initialization failed, but basic functionality works');
            }
        }

        // Start the app when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }

        // Global error handler
        window.addEventListener('error', function(event) {
            console.error('Global error:', event.error);
            Toast.error('Something went wrong, but the app is still running');
        });

        // Handle unhandled promise rejections
        window.addEventListener('unhandledrejection', function(event) {
            console.error('Unhandled rejection:', event.reason);
            Toast.error('An unexpected error occurred');
        });
    </script>
    <script>
        // Page-specific initialization
        document.addEventListener('DOMContentLoaded', () => {
            console.log('📄 Page loaded');
        });
    </script>
</body>
</html>
