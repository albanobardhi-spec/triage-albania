<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIAGE · Albania Traveler Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .post-card {
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }
        .post-card:hover {
            transform: translateX(5px);
            border-left-color: #e11d48;
        }
        .like-btn.active {
            color: #e11d48;
            transform: scale(1.1);
        }
        @keyframes heart-pop {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        .heart-animation {
            animation: heart-pop 0.3s ease;
        }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Header -->
    <div class="bg-gradient-to-r from-red-600 to-black-600 text-white py-3">
        <div class="container mx-auto px-4 flex items-center">
            <span class="text-2xl mr-3">🇦🇱</span>
            <span class="font-medium">Join travelers discovering Albania</span>
        </div>
    </div>

    <div class="container mx-auto px-4 py-8 max-w-2xl">
        
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-3xl font-bold flex items-center">
                <span class="text-4xl mr-3">👥</span>
                Albania Traveler Feed
            </h1>
            <div class="bg-red-100 text-red-600 px-4 py-2 rounded-full flex items-center">
                <span class="w-3 h-3 bg-red-500 rounded-full mr-2 animate-pulse"></span>
                <span id="live-counter">342</span> exploring now
            </div>
        </div>

        <!-- Create Post -->
        <div class="bg-white rounded-xl shadow-sm p-4 mb-6">
            <div class="flex items-center">
                <div class="w-10 h-10 bg-gradient-to-br from-red-500 to-black-500 rounded-full flex items-center justify-center text-white font-bold mr-3">
                    YOU
                </div>
                <input type="text" id="post-content" placeholder="Share your Albanian discovery..." class="flex-1 bg-gray-100 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-red-300">
                <button onclick="createPost()" class="ml-3 bg-red-600 text-white px-6 py-2 rounded-full font-medium hover:bg-red-700 transition">
                    Post
                </button>
            </div>
        </div>

        <!-- Feed Filters -->
        <div class="flex space-x-2 mb-6 overflow-x-auto pb-2">
            <button onclick="filterFeed('all')" class="filter-btn active bg-red-600 text-white px-4 py-2 rounded-full text-sm font-medium">✨ All</button>
            <button onclick="filterFeed('history')" class="filter-btn bg-gray-200 text-gray-700 px-4 py-2 rounded-full text-sm font-medium">🏛️ History</button>
            <button onclick="filterFeed('nature')" class="filter-btn bg-gray-200 text-gray-700 px-4 py-2 rounded-full text-sm font-medium">⛰️ Nature</button>
            <button onclick="filterFeed('food')" class="filter-btn bg-gray-200 text-gray-700 px-4 py-2 rounded-full text-sm font-medium">🍖 Food</button>
            <button onclick="filterFeed('beach')" class="filter-btn bg-gray-200 text-gray-700 px-4 py-2 rounded-full text-sm font-medium">🏖️ Beach</button>
        </div>

        <!-- Posts Container -->
        <div class="space-y-4" id="feed-container">
            <!-- Posts injected here -->
        </div>

        <!-- Load More -->
        <div class="text-center mt-8">
            <button onclick="loadMorePosts()" class="bg-gray-200 text-gray-700 px-8 py-3 rounded-full font-medium hover:bg-gray-300 transition">
                Load More Adventures ⬇️
            </button>
        </div>
    </div>

    <script>
        // Sample posts database
        let posts = [
            {
                id: 1,
                userName: 'Sarah from UK',
                userAvatar: '👩',
                time: '25 min ago',
                location: 'Butrint',
                content: 'Walking through 2500 years of history at Butrint! The lion gate and baptistery mosaics are incredible. 🇦🇱',
                emoji: '🏛️',
                likes: 45,
                comments: 12,
                liked: false,
                category: 'history'
            },
            {
                id: 2,
                userName: 'Mike from Germany',
                userAvatar: '👨',
                time: '1 hour ago',
                location: 'Theth',
                content: 'Made it to Theth! The Grunas waterfall is stunning and the hospitality at the guesthouse is unmatched.',
                emoji: '⛰️',
                likes: 89,
                comments: 23,
                liked: true,
                category: 'nature'
            },
            {
                id: 3,
                userName: 'Elena from Italy',
                userAvatar: '👩‍🦱',
                time: '3 hours ago',
                location: 'Gjirokastër',
                content: 'The Stone City is magical! Walking up to the castle at sunset.',
                emoji: '🏰',
                likes: 67,
                comments: 15,
                liked: false,
                category: 'history'
            },
            {
                id: 4,
                userName: 'Carlos from Spain',
                userAvatar: '👨',
                time: '5 hours ago',
                location: 'Ksamil',
                content: 'The Albanian Riviera does not disappoint! Crystal clear water, islands to swim to.',
                emoji: '🏝️',
                likes: 112,
                comments: 34,
                liked: false,
                category: 'beach'
            },
            {
                id: 5,
                userName: 'Yuki from Japan',
                userAvatar: '👩',
                time: '7 hours ago',
                location: 'Berat',
                content: 'The City of a Thousand Windows is even more beautiful in person.',
                emoji: '🏘️',
                likes: 78,
                comments: 19,
                liked: true,
                category: 'history'
            },
            {
                id: 6,
                userName: 'Anna from France',
                userAvatar: '👱‍♀️',
                time: '12 hours ago',
                location: 'Tirana',
                content: 'BunkArt is mind-blowing! An entire underground bunker turned into museum.',
                emoji: '🚇',
                likes: 56,
                comments: 8,
                liked: false,
                category: 'history'
            }
        ];

        let displayedPosts = 4;
        let currentFilter = 'all';

        // Render feed
        function renderFeed() {
            const container = document.getElementById('feed-container');
            container.innerHTML = '';
            
            const filtered = currentFilter === 'all' 
                ? posts 
                : posts.filter(p => p.category === currentFilter);
            
            filtered.slice(0, displayedPosts).forEach(post => {
                container.innerHTML += createPostHTML(post);
            });
        }

        // Create post HTML
        function createPostHTML(post) {
            return `
                <div class="post-card bg-white rounded-xl shadow-sm p-5" data-id="${post.id}">
                    <div class="flex items-start">
                        <div class="w-10 h-10 bg-gradient-to-br from-red-500 to-black-500 rounded-full flex items-center justify-center text-white font-bold mr-3 text-xl">
                            ${post.userAvatar}
                        </div>
                        <div class="flex-1">
                            <div class="flex items-center justify-between">
                                <div>
                                    <span class="font-bold">${post.userName}</span>
                                    <span class="text-gray-400 text-sm ml-2">${post.time}</span>
                                </div>
                                <span class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded-full">📍 ${post.location}</span>
                            </div>
                            
                            <p class="mt-2">${post.content}</p>
                            
                            <div class="flex items-center mt-3 text-4xl">
                                ${post.emoji}
                            </div>
                            
                            <div class="flex items-center justify-between mt-4 pt-2 border-t">
                                <button onclick="likePost(${post.id})" class="like-btn flex items-center ${post.liked ? 'active text-red-500' : 'text-gray-500'}">
                                    <span class="text-xl mr-1">❤️</span>
                                    <span>${post.likes}</span>
                                </button>
                                <button onclick="commentPost(${post.id})" class="flex items-center text-gray-500 hover:text-gray-700">
                                    <span class="text-xl mr-1">💬</span>
                                    <span>${post.comments}</span>
                                </button>
                                <button onclick="sharePost(${post.id})" class="flex items-center text-gray-500 hover:text-gray-700">
                                    <span class="text-xl mr-1">🔄</span>
                                    <span>Share</span>
                                </button>
                                <button onclick="saveToAlbania(${post.id})" class="flex items-center text-gray-500 hover:text-red-500">
                                    <span class="text-xl mr-1">🔖</span>
                                    <span>Save</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // Like post
        window.likePost = function(postId) {
            const post = posts.find(p => p.id === postId);
            if (post) {
                post.liked = !post.liked;
                post.likes += post.liked ? 1 : -1;
                
                const btn = event.currentTarget;
                btn.classList.add('heart-animation');
                setTimeout(() => btn.classList.remove('heart-animation'), 300);
                
                renderFeed();
            }
        };

        // Create new post
        window.createPost = function() {
            const content = document.getElementById('post-content').value;
            if (!content) return;
            
            const newPost = {
                id: posts.length + 1,
                userName: 'You',
                userAvatar: '👤',
                time: 'just now',
                location: 'Current location',
                content: content,
                emoji: '✨',
                likes: 0,
                comments: 0,
                liked: false,
                category: 'all'
            };
            
            posts.unshift(newPost);
            document.getElementById('post-content').value = '';
            renderFeed();
            
            showNotification('✨ Post shared!');
        };

        // Share post
        window.sharePost = function(postId) {
            const post = posts.find(p => p.id === postId);
            const text = `${post.userName} in ${post.location}: ${post.content}`;
            
            if (navigator.share) {
                navigator.share({ title: 'Albania Travel', text });
            } else {
                navigator.clipboard.writeText(text);
                alert('📋 Copied to clipboard!');
            }
        };

        // Save to list
        window.saveToAlbania = function(postId) {
            const post = posts.find(p => p.id === postId);
            
            let savedItems = JSON.parse(localStorage.getItem('albanianSavedItems')) || [];
            
            savedItems.push({
                id: Date.now(),
                name: post.location,
                emoji: post.emoji,
                location: post.location,
                fromPost: true
            });
            
            localStorage.setItem('albanianSavedItems', JSON.stringify(savedItems));
            showNotification('✨ Saved to your list!');
        };

        // Filter feed
        window.filterFeed = function(filter) {
            currentFilter = filter;
            displayedPosts = 4;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-red-600', 'text-white');
                btn.classList.add('bg-gray-200', 'text-gray-700');
            });
            event.target.classList.remove('bg-gray-200', 'text-gray-700');
            event.target.classList.add('active', 'bg-red-600', 'text-white');
            
            renderFeed();
        };

        // Load more
        window.loadMorePosts = function() {
            displayedPosts += 2;
            renderFeed();
        };

        // Comment placeholder
        window.commentPost = function(postId) {
            alert('Comments coming soon!');
        };

        // Show notification
        function showNotification(message) {
            const notif = document.createElement('div');
            notif.className = 'fixed top-20 left-1/2 transform -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-full shadow-2xl z-50';
            notif.textContent = message;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2000);
        }

        // Update live counter
        setInterval(() => {
            document.getElementById('live-counter').textContent = Math.floor(300 + Math.random() * 100);
        }, 10000);

        // Initialize
        renderFeed();
    </script>
</body>
</html>
