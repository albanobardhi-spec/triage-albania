<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIAGE · Build Your Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Use a reliable QR library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <!-- Backup QR Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <style>
        .option-card {
            transition: all 0.2s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .option-card.selected {
            transform: scale(1.02);
            border-color: #e11d48;
            background-color: #fff1f2;
        }
        .option-card:hover {
            border-color: #f43f5e;
            background-color: #fff1f2;
        }
        @keyframes bounce-small {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .bounce-on-select {
            animation: bounce-small 0.3s ease;
        }
        #qr-code {
            min-height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #qr-code canvas, #qr-code img {
            max-width: 100%;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .qr-fallback {
            background: #f3f4f6;
            padding: 20px;
            border-radius: 12px;
            font-family: monospace;
            word-break: break-all;
            max-width: 100%;
            overflow-x: auto;
        }
    </style>
    <script src="js/config.js"></script>      <!-- MUST come first -->
    <script src="js/api-client.js"></script>  <!-- Then this -->
    <script src="js/app.js"></script>         <!-- Then your app -->
</head>
<body class="bg-gradient-to-b from-red-50 to-orange-50 min-h-screen">

    <!-- Kiosk Mode Indicator -->
    <div id="kiosk-banner" class="bg-red-600 text-white py-2 text-center hidden">
        <span class="text-xl mr-2">🖥️</span>
        Kiosk Mode - Your session will be saved with QR code
    </div>

    <div class="container mx-auto px-4 py-8 max-w-2xl">
        
        <!-- Progress -->
        <div class="mb-8">
            <div class="flex justify-between items-center mb-2">
                <span class="text-sm font-medium text-red-600" id="step-indicator">Question 1 of 5</span>
                <span class="text-sm text-gray-500" id="progress-percent">20%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-3">
                <div class="bg-gradient-to-r from-red-500 to-red-600 h-3 rounded-full transition-all duration-500" id="progress-bar" style="width: 20%"></div>
            </div>
        </div>

        <!-- Quiz Container -->
        <div id="quiz-container" class="bg-white rounded-3xl shadow-xl p-8 mb-6">
            <!-- Questions injected by JS -->
        </div>

        <!-- Navigation -->
        <div class="flex justify-between">
            <button id="prev-btn" class="px-6 py-3 bg-gray-100 text-gray-500 rounded-full font-medium hover:bg-gray-200 transition disabled:opacity-30" disabled>
                ← Back
            </button>
            <button id="next-btn" class="px-8 py-3 bg-gradient-to-r from-red-600 to-red-700 text-white rounded-full font-bold hover:shadow-lg transition transform hover:scale-105">
                Next →
            </button>
        </div>

        <!-- QR Code Section (shown after completion) -->
        <div id="qr-section" class="mt-8 hidden">
            <div class="bg-white rounded-2xl p-6 text-center">
                <h3 class="text-2xl font-bold mb-2">📱 Scan to Continue on Your Phone</h3>
                <p class="text-gray-500 mb-6">Your personalized Albanian journey is ready</p>
                
                <!-- QR Code Container -->
                <div id="qr-code" class="flex justify-center mb-4">
                    <div class="text-gray-400">Generating QR code...</div>
                </div>
                
                <!-- Manual Code Entry -->
                <div class="bg-gray-50 rounded-xl p-4 mb-4">
                    <p class="text-sm text-gray-500 mb-2">Or use this code:</p>
                    <div class="flex items-center justify-center space-x-2">
                        <span id="short-code" class="font-mono text-2xl font-bold bg-gray-100 px-4 py-2 rounded-lg tracking-wider">------</span>
                        <button onclick="copyCode()" class="bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded-lg text-sm font-medium transition">
                            Copy
                        </button>
                    </div>
                </div>
                
                <p class="text-xs text-gray-400 mb-4">⏰ Session expires in 60 minutes</p>
                
                <button onclick="continueToResults()" class="bg-gray-100 text-gray-700 px-6 py-2 rounded-full text-sm font-medium hover:bg-gray-200 transition">
                    Or continue on this device →
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==================== QUESTIONS ====================
        const questions = [
            {
                question: "What calls to your spirit in Albania?",
                emoji: "🇦🇱",
                options: [
                    { emoji: "🏛️", text: "Ancient Illyrian ruins", value: "history" },
                    { emoji: "⛰️", text: "Accursed Mountains hiking", value: "nature" },
                    { emoji: "🏖️", text: "Albanian Riviera beaches", value: "beach" },
                    { emoji: "🍖", text: "Traditional cuisine", value: "food" },
                    { emoji: "🏺", text: "Ottoman-era bazaars", value: "culture" }
                ]
            },
            {
                question: "Who's exploring with you?",
                emoji: "👥",
                options: [
                    { emoji: "🧑", text: "Solo adventurer", value: "solo" },
                    { emoji: "💑", text: "Romantic getaway", value: "couple" },
                    { emoji: "👨‍👩‍👧‍👦", text: "Family with kids", value: "family" },
                    { emoji: "👫", text: "Group of friends", value: "friends" },
                    { emoji: "👴👵", text: "With elders", value: "elders" }
                ]
            },
            {
                question: "Your preferred pace?",
                emoji: "🏃",
                options: [
                    { emoji: "⚡", text: "Full speed - see everything!", value: "fast" },
                    { emoji: "🚶", text: "Moderate - enjoy each moment", value: "moderate" },
                    { emoji: "😌", text: "Slow - truly absorb the culture", value: "slow" }
                ]
            },
            {
                question: "How much time in Albania?",
                emoji: "⏰",
                options: [
                    { emoji: "⚡", text: "Just passing through (1-2 days)", value: "short" },
                    { emoji: "🌤️", text: "Weekend escape (3-4 days)", value: "medium" },
                    { emoji: "🌅", text: "Full immersion (5+ days)", value: "long" }
                ]
            },
            {
                question: "Special interests?",
                emoji: "🎯",
                options: [
                    { emoji: "📷", text: "Photography spots", value: "photo" },
                    { emoji: "🍷", text: "Wine tasting (Kallmet, Shesh)", value: "wine" },
                    { emoji: "🏺", text: "Archaeology & history", value: "archaeology" },
                    { emoji: "🏞️", text: "National parks", value: "parks" },
                    { emoji: "🕌", text: "Religious heritage", value: "religious" }
                ]
            }
        ];

        let currentQuestion = 0;
        let answers = [];
        const urlParams = new URLSearchParams(window.location.search);
        const isKiosk = urlParams.has('kiosk');

        // Show kiosk banner
        if (isKiosk) {
            document.getElementById('kiosk-banner').classList.remove('hidden');
        }

        // Update progress bar
        function updateProgress() {
            const percent = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('progress-percent').textContent = Math.round(percent) + '%';
            document.getElementById('step-indicator').textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
        }

        // Render current question
        function renderQuestion() {
            const q = questions[currentQuestion];
            const container = document.getElementById('quiz-container');
            
            let html = `
                <div class="text-center mb-8">
                    <span class="text-7xl block mb-4">${q.emoji}</span>
                    <h2 class="text-3xl font-bold text-gray-800">${q.question}</h2>
                </div>
                <div class="grid grid-cols-1 gap-4">
            `;
            
            q.options.forEach((option, index) => {
                const isSelected = answers[currentQuestion] === option.value;
                html += `
                    <div class="option-card p-5 border-2 rounded-2xl hover:border-red-300 hover:bg-red-50 flex items-center ${isSelected ? 'selected border-red-500 bg-red-50' : 'border-gray-200'}"
                         data-value="${option.value}" data-index="${index}">
                        <span class="text-3xl mr-4">${option.emoji}</span>
                        <span class="text-xl font-medium flex-1">${option.text}</span>
                        ${isSelected ? '<span class="text-red-500 text-2xl">✓</span>' : ''}
                    </div>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
            
            // Add click handlers
            document.querySelectorAll('.option-card').forEach(card => {
                card.addEventListener('click', function() {
                    document.querySelectorAll('.option-card').forEach(c => {
                        c.classList.remove('selected', 'border-red-500', 'bg-red-50');
                    });
                    
                    this.classList.add('selected', 'border-red-500', 'bg-red-50');
                    this.classList.add('bounce-on-select');
                    setTimeout(() => this.classList.remove('bounce-on-select'), 300);
                    
                    document.querySelectorAll('.option-card span:last-child').forEach(s => {
                        if (s.textContent === '✓') s.remove();
                    });
                    
                    const checkmark = document.createElement('span');
                    checkmark.className = 'text-red-500 text-2xl';
                    checkmark.textContent = '✓';
                    this.appendChild(checkmark);
                    
                    answers[currentQuestion] = this.dataset.value;
                    
                    // Auto-advance
                    setTimeout(() => {
                        if (currentQuestion < questions.length - 1) {
                            document.getElementById('next-btn').click();
                        }
                    }, 500);
                });
            });
            
            updateProgress();
        }

        // Generate a simple session ID
        function generateSessionId() {
            return 'SESS_' + Date.now().toString(36).toUpperCase() + '_' + Math.random().toString(36).substr(2, 8).toUpperCase();
        }

        // ==================== REAL QR CODE GENERATION ====================
        
        // Method 1: Use qrcode library (most reliable)
        function generateQRWithLibrary(sessionUrl, container) {
            return new Promise((resolve, reject) => {
                if (typeof QRCode === 'undefined' || !QRCode.toCanvas) {
                    reject('QRCode library not available');
                    return;
                }
                
                const canvas = document.createElement('canvas');
                
                QRCode.toCanvas(canvas, sessionUrl, {
                    width: 280,
                    margin: 2,
                    color: {
                        dark: '#e11d48',
                        light: '#ffffff'
                    },
                    errorCorrectionLevel: 'H'
                }, (error) => {
                    if (error) {
                        reject(error);
                    } else {
                        container.innerHTML = '';
                        container.appendChild(canvas);
                        resolve(canvas);
                    }
                });
            });
        }

        // Method 2: Use qrcode-generator library (backup)
        function generateQRWithGenerator(sessionUrl, container) {
            return new Promise((resolve, reject) => {
                if (typeof qrcode === 'undefined') {
                    reject('qrcode-generator not available');
                    return;
                }
                
                try {
                    const qr = qrcode(0, 'H');
                    qr.addData(sessionUrl);
                    qr.make();
                    
                    const size = qr.getModuleCount();
                    const cellSize = 6;
                    const width = size * cellSize;
                    
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = width;
                    const ctx = canvas.getContext('2d');
                    
                    // White background
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, width, width);
                    
                    // Draw QR modules
                    ctx.fillStyle = '#e11d48';
                    for (let row = 0; row < size; row++) {
                        for (let col = 0; col < size; col++) {
                            if (qr.isDark(row, col)) {
                                ctx.fillRect(col * cellSize, row * cellSize, cellSize - 1, cellSize - 1);
                            }
                        }
                    }
                    
                    container.innerHTML = '';
                    container.appendChild(canvas);
                    resolve(canvas);
                } catch (error) {
                    reject(error);
                }
            });
        }

        // Method 3: Manual QR code generation (last resort)
        function generateManualQR(sessionUrl, container) {
            // Simple QR-like pattern - not scannable but better than nothing
            container.innerHTML = `
                <div class="bg-white p-4 rounded-xl text-center">
                    <div class="text-6xl mb-4">📱</div>
                    <p class="font-mono text-sm bg-gray-100 p-3 rounded break-all">${sessionUrl}</p>
                    <p class="text-xs text-gray-500 mt-2">Please use the manual code below</p>
                </div>
            `;
            return Promise.resolve();
        }

        // Main QR generation function with fallbacks
        async function generateRealQRCode(sessionId) {
            const qrContainer = document.getElementById('qr-code');
            const sessionUrl = `${window.location.origin}/mobile-load.html?session=${sessionId}`;
            
            qrContainer.innerHTML = '<div class="text-gray-400">Generating QR code...</div>';
            
            // Try Method 1
            try {
                await generateQRWithLibrary(sessionUrl, qrContainer);
                console.log('✅ QR generated with primary library');
                return;
            } catch (error) {
                console.warn('Primary QR library failed:', error);
            }
            
            // Try Method 2
            try {
                await generateQRWithGenerator(sessionUrl, qrContainer);
                console.log('✅ QR generated with backup library');
                return;
            } catch (error) {
                console.warn('Backup QR library failed:', error);
            }
            
            // Method 3 - Manual fallback
            await generateManualQR(sessionUrl, qrContainer);
            console.log('⚠️ Using manual QR fallback');
        }

        // Complete quiz and show QR
        async function completeQuiz() {
            const profile = {
                interests: answers[0],
                groupType: answers[1],
                pace: answers[2],
                duration: answers[3],
                special: answers[4],
                completed: new Date().toISOString()
            };
            
            // Save profile
            localStorage.setItem('currentProfile', JSON.stringify(profile));
            
            if (isKiosk) {
                // Generate session ID
                const sessionId = generateSessionId();
                const shortCode = sessionId.substring(0, 8);
                
                // Save session data
                const sessionData = {
                    id: sessionId,
                    profile: profile,
                    savedItems: JSON.parse(localStorage.getItem('albanianSavedItems') || '[]'),
                    createdAt: new Date().toISOString(),
                    expiresAt: new Date(Date.now() + 3600000).toISOString()
                };
                
                localStorage.setItem(`session_${sessionId}`, JSON.stringify(sessionData));
                localStorage.setItem('current_session', sessionId);
                
                // Show QR section
                document.getElementById('qr-section').classList.remove('hidden');
                document.getElementById('short-code').textContent = shortCode;
                
                // Hide navigation
                document.getElementById('prev-btn').style.display = 'none';
                document.getElementById('next-btn').style.display = 'none';
                
                // Generate REAL scannable QR code
                await generateRealQRCode(sessionId);
                
            } else {
                // Normal mode - go to results
                window.location.href = 'triage-results.html';
            }
        }

        // Copy code to clipboard
        window.copyCode = function() {
            const code = document.getElementById('short-code').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('✅ Code copied to clipboard!');
            }).catch(() => {
                alert('Please copy the code manually: ' + code);
            });
        };

        // Continue on this device
        window.continueToResults = function() {
            window.location.href = 'triage-results.html';
        };

        // Navigation
        document.getElementById('next-btn').addEventListener('click', () => {
            if (!answers[currentQuestion]) {
                alert('Please select an option to continue!');
                return;
            }
            
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
                document.getElementById('prev-btn').disabled = false;
            } else {
                completeQuiz();
            }
        });

        document.getElementById('prev-btn').addEventListener('click', () => {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
                document.getElementById('prev-btn').disabled = currentQuestion === 0;
            }
        });

        // Initialize
        renderQuestion();

        // Verify QR libraries loaded
        window.addEventListener('load', () => {
            if (typeof QRCode !== 'undefined') {
                console.log('✅ QRCode library loaded');
            }
            if (typeof qrcode !== 'undefined') {
                console.log('✅ qrcode-generator library loaded');
            }
        });
    </script>
     <script>
        // Page-specific initialization
        document.addEventListener('DOMContentLoaded', () => {
            console.log('📄 Page loaded');
        });
    </script>
</body>
</body>
</html>
