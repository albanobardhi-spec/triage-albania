<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIAGE · Build Your Albanian Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        .option-card {
            transition: all 0.2s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .option-card.selected {
            transform: scale(1.02);
            border-color: #e11d48;
            background-color: #fff1f2;
        }
        #qr-code canvas {
            max-width: 100%;
            height: auto;
            border-radius: 16px;
            margin: 0 auto;
        }
    </style>
</head>
<body class="bg-gradient-to-b from-red-50 to-orange-50 min-h-screen">

    <!-- Kiosk Banner -->
    <div id="kiosk-banner" class="bg-red-600 text-white py-2 text-center hidden">
        <span class="text-xl mr-2">🖥️</span> Kiosk Mode
    </div>

    <div class="container mx-auto px-4 py-8 max-w-2xl">
        
        <!-- Progress -->
        <div class="mb-8">
            <div class="flex justify-between items-center mb-2">
                <span class="text-sm font-medium text-red-600" id="step-indicator">Question 1 of 5</span>
                <span class="text-sm text-gray-500" id="progress-percent">20%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-3">
                <div class="bg-gradient-to-r from-red-500 to-red-600 h-3 rounded-full" id="progress-bar" style="width: 20%"></div>
            </div>
        </div>

        <!-- Quiz Container -->
        <div id="quiz-container" class="bg-white rounded-3xl shadow-xl p-8 mb-6"></div>

        <!-- Navigation -->
        <div class="flex justify-between">
            <button id="prev-btn" class="px-6 py-3 bg-gray-100 text-gray-500 rounded-full disabled:opacity-30" disabled>← Back</button>
            <button id="next-btn" class="px-8 py-3 bg-gradient-to-r from-red-600 to-red-700 text-white rounded-full font-bold hover:shadow-lg">Next →</button>
        </div>

        <!-- QR Code Section -->
        <div id="qr-section" class="mt-8 hidden">
            <div class="bg-white rounded-2xl p-6 text-center">
                <span class="text-5xl block mb-4">📱</span>
                <h3 class="text-2xl font-bold mb-2">Scan on Your Phone</h3>
                <p class="text-gray-500 mb-6">Your profile is ready to go!</p>
                
                <!-- QR Code -->
                <div id="qr-code" class="flex justify-center mb-4 min-h-[250px] items-center">
                    <div class="text-gray-400">Generating...</div>
                </div>
                
                <!-- Manual Link -->
                <div class="bg-gray-50 p-4 rounded-xl mt-4">
                    <p class="text-sm text-gray-500 mb-2">Or send this link to your phone:</p>
                    <div class="bg-white p-3 rounded-lg border text-sm break-all font-mono" id="share-link"></div>
                    <button onclick="copyLink()" class="mt-3 bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded-full text-sm">
                        📋 Copy Link
                    </button>
                </div>
                
                <p class="text-xs text-gray-400 mt-4">⏰ Link expires in 60 minutes</p>
                
                <button onclick="continueOnDevice()" class="mt-4 text-red-600 hover:text-red-800 text-sm">
                    Continue on this device instead →
                </button>
            </div>
        </div>

        <!-- Success Section (Normal Mode) -->
        <div id="success-section" class="mt-8 hidden">
            <div class="bg-green-50 border-2 border-green-500 rounded-2xl p-6 text-center">
                <span class="text-5xl block mb-4">✨</span>
                <h3 class="text-2xl font-bold text-green-700 mb-2">Profile Complete!</h3>
                <a href="triage-results.html" class="inline-block bg-green-600 text-white px-8 py-3 rounded-full font-bold hover:bg-green-700">
                    View Recommendations →
                </a>
            </div>
        </div>
    </div>

    <script>
        // Questions
        const questions = [
            {
                question: "What calls to your spirit in Albania?",
                options: [
                    { emoji: "🏛️", text: "Ancient Illyrian ruins", value: "history" },
                    { emoji: "⛰️", text: "Accursed Mountains", value: "nature" },
                    { emoji: "🏖️", text: "Albanian Riviera", value: "beach" },
                    { emoji: "🍖", text: "Traditional cuisine", value: "food" },
                    { emoji: "🏺", text: "Ottoman bazaars", value: "culture" }
                ]
            },
            {
                question: "Who's exploring?",
                options: [
                    { emoji: "🧑", text: "Solo", value: "solo" },
                    { emoji: "💑", text: "Couple", value: "couple" },
                    { emoji: "👨‍👩‍👧‍👦", text: "Family", value: "family" },
                    { emoji: "👫", text: "Friends", value: "friends" }
                ]
            },
            {
                question: "Your pace?",
                options: [
                    { emoji: "⚡", text: "Fast", value: "fast" },
                    { emoji: "🚶", text: "Moderate", value: "moderate" },
                    { emoji: "😌", text: "Slow", value: "slow" }
                ]
            },
            {
                question: "Time in Albania?",
                options: [
                    { emoji: "⚡", text: "1-2 days", value: "short" },
                    { emoji: "🌤️", text: "3-4 days", value: "medium" },
                    { emoji: "🌅", text: "5+ days", value: "long" }
                ]
            },
            {
                question: "Special interests?",
                options: [
                    { emoji: "📷", text: "Photography", value: "photo" },
                    { emoji: "🍷", text: "Wine tasting", value: "wine" },
                    { emoji: "🏺", text: "Archaeology", value: "archaeology" }
                ]
            }
        ];

        let currentQuestion = 0;
        let answers = [];
        const isKiosk = new URLSearchParams(window.location.search).has('kiosk');

        if (isKiosk) {
            document.getElementById('kiosk-banner').classList.remove('hidden');
        }

        function updateProgress() {
            const percent = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('progress-percent').textContent = Math.round(percent) + '%';
            document.getElementById('step-indicator').textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
        }

        function renderQuestion() {
            const q = questions[currentQuestion];
            let html = `
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-bold text-gray-800">${q.question}</h2>
                </div>
                <div class="grid grid-cols-1 gap-4">
            `;
            
            q.options.forEach((option) => {
                const isSelected = answers[currentQuestion] === option.value;
                html += `
                    <div class="option-card p-5 border-2 rounded-2xl hover:border-red-300 hover:bg-red-50 flex items-center ${isSelected ? 'selected border-red-500 bg-red-50' : 'border-gray-200'}"
                         data-value="${option.value}">
                        <span class="text-3xl mr-4">${option.emoji}</span>
                        <span class="text-xl font-medium flex-1">${option.text}</span>
                        ${isSelected ? '<span class="text-red-500 text-2xl">✓</span>' : ''}
                    </div>
                `;
            });
            html += '</div>';
            
            document.getElementById('quiz-container').innerHTML = html;
            
            document.querySelectorAll('.option-card').forEach(card => {
                card.addEventListener('click', function() {
                    document.querySelectorAll('.option-card').forEach(c => {
                        c.classList.remove('selected', 'border-red-500', 'bg-red-50');
                    });
                    this.classList.add('selected', 'border-red-500', 'bg-red-50');
                    answers[currentQuestion] = this.dataset.value;
                    
                    setTimeout(() => {
                        if (currentQuestion < questions.length - 1) {
                            document.getElementById('next-btn').click();
                        }
                    }, 500);
                });
            });
            
            updateProgress();
        }

        // ============================================
        // GENERATE SHAREABLE LINK
        // ============================================
        async function generateShareableLink() {
            // Create profile data as simple string
            const profileStr = answers.join(',');
            const timestamp = Date.now();
            
            // Create URL with all data
            const baseUrl = window.location.origin;
            const mobileUrl = `${baseUrl}/mobile-view.html?data=${encodeURIComponent(profileStr)}&t=${timestamp}`;
            
            // Display link
            document.getElementById('share-link').textContent = mobileUrl;
            
            // Generate QR code
            try {
                const canvas = document.createElement('canvas');
                QRCode.toCanvas(canvas, mobileUrl, {
                    width: 250,
                    margin: 2,
                    color: { dark: '#e11d48', light: '#ffffff' }
                }, function(err) {
                    if (err) {
                        console.error(err);
                        document.getElementById('qr-code').innerHTML = '<div class="text-red-500">QR generation failed</div>';
                    } else {
                        document.getElementById('qr-code').innerHTML = '';
                        document.getElementById('qr-code').appendChild(canvas);
                    }
                });
            } catch (err) {
                console.error(err);
                document.getElementById('qr-code').innerHTML = '<div class="text-red-500">QR generation failed</div>';
            }
            
            // Also save locally as backup
            const profile = {
                interests: answers[0] || 'history',
                groupType: answers[1] || 'solo',
                pace: answers[2] || 'moderate',
                duration: answers[3] || 'medium',
                special: answers[4] || 'photo'
            };
            localStorage.setItem('currentProfile', JSON.stringify(profile));
        }

        // ============================================
        // QUIZ COMPLETION
        // ============================================
        async function completeQuiz() {
            // Hide navigation
            document.getElementById('prev-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            
            if (isKiosk) {
                document.getElementById('qr-section').classList.remove('hidden');
                await generateShareableLink();
            } else {
                const profile = {
                    interests: answers[0] || 'history',
                    groupType: answers[1] || 'solo',
                    pace: answers[2] || 'moderate',
                    duration: answers[3] || 'medium',
                    special: answers[4] || 'photo'
                };
                localStorage.setItem('currentProfile', JSON.stringify(profile));
                document.getElementById('success-section').classList.remove('hidden');
            }
        }

        window.copyLink = function() {
            const link = document.getElementById('share-link').textContent;
            navigator.clipboard.writeText(link).then(() => {
                alert('✅ Link copied! Send it to your phone');
            });
        };

        window.continueOnDevice = function() {
            window.location.href = 'triage-results.html';
        };

        // Navigation
        document.getElementById('next-btn').addEventListener('click', () => {
            if (!answers[currentQuestion]) {
                alert('Please select an option');
                return;
            }
            
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
                document.getElementById('prev-btn').disabled = false;
            } else {
                document.getElementById('next-btn').disabled = true;
                completeQuiz();
            }
        });

        document.getElementById('prev-btn').addEventListener('click', () => {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
                document.getElementById('prev-btn').disabled = currentQuestion === 0;
            }
        });

        renderQuestion();
    </script>
</body>
</html>
