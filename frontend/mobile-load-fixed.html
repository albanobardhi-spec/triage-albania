<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIAGE · Load Your Journey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #e11d48;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-red-50 to-orange-50 min-h-screen">

    <div class="container mx-auto px-4 py-12 max-w-md">
        
        <!-- Header -->
        <div class="text-center mb-8 fade-in">
            <div class="inline-block bg-white shadow-xl rounded-full p-4 mb-4 border-4 border-red-500">
                <span class="text-6xl">🇦🇱</span>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">TRIAGE Albania</h1>
        </div>

        <!-- Loading State -->
        <div id="loading-state" class="bg-white rounded-3xl shadow-2xl p-8 text-center fade-in">
            <div class="loader mx-auto mb-6"></div>
            <h2 class="text-2xl font-bold mb-2">Loading Your Journey</h2>
            <p class="text-gray-500 mb-4" id="loading-message">Please wait...</p>
            <div class="w-full bg-gray-200 rounded-full h-2 mb-4">
                <div class="bg-gradient-to-r from-red-500 to-red-600 h-2 rounded-full transition-all duration-500" id="progress-bar" style="width: 0%"></div>
            </div>
            <button id="manual-btn" onclick="showManual()" class="text-sm text-red-600 hover:underline hidden">
                Taking too long? Enter code manually
            </button>
        </div>

        <!-- Manual Entry -->
        <div id="manual-state" class="bg-white rounded-3xl shadow-2xl p-8 text-center hidden fade-in">
            <span class="text-5xl block mb-4">⌨️</span>
            <h2 class="text-2xl font-bold mb-4">Enter Session Code</h2>
            <input type="text" id="session-code" placeholder="Enter code" 
                   class="w-full px-4 py-3 border-2 rounded-xl text-center font-mono text-xl mb-4">
            <button onclick="loadManual()" class="w-full bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-700">
                Load Session
            </button>
        </div>

        <!-- Success -->
        <div id="success-state" class="bg-white rounded-3xl shadow-2xl p-8 text-center hidden fade-in">
            <span class="text-7xl block mb-4 animate-bounce">✨</span>
            <h2 class="text-2xl font-bold mb-2">Journey Loaded!</h2>
            <a href="triage-results.html" class="block w-full bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-700 mt-4">
                Start Exploring →
            </a>
        </div>
    </div>

    <script>
        // Get session from URL
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session');

        // Elements
        const loadingState = document.getElementById('loading-state');
        const manualState = document.getElementById('manual-state');
        const successState = document.getElementById('success-state');
        const loadingMsg = document.getElementById('loading-message');
        const progressBar = document.getElementById('progress-bar');
        const manualBtn = document.getElementById('manual-btn');

        // Update progress
        function setProgress(percent, msg) {
            progressBar.style.width = percent + '%';
            if (msg) loadingMsg.textContent = msg;
        }

        // Show manual after 3 seconds
        setTimeout(() => {
            manualBtn.classList.remove('hidden');
        }, 3000);

        // Find session in localStorage
        function findSession(id) {
            if (!id) return null;
            const exact = localStorage.getItem(`session_${id}`);
            if (exact) return JSON.parse(exact);
            
            for (let key of Object.keys(localStorage)) {
                if (key.includes(id)) {
                    try {
                        return JSON.parse(localStorage.getItem(key));
                    } catch (e) {}
                }
            }
            return null;
        }

        // Load session function
        function loadSession(id) {
            setProgress(20, 'Checking...');
            
            setTimeout(() => {
                setProgress(60, 'Searching...');
                
                setTimeout(() => {
                    const session = findSession(id);
                    
                    if (session) {
                        setProgress(100, 'Found!');
                        localStorage.setItem('currentProfile', JSON.stringify(session.profile || {}));
                        if (session.savedItems) {
                            localStorage.setItem('albanianSavedItems', JSON.stringify(session.savedItems));
                        }
                        setTimeout(() => {
                            loadingState.classList.add('hidden');
                            successState.classList.remove('hidden');
                        }, 500);
                    } else {
                        setProgress(100, 'Not found');
                        setTimeout(() => {
                            loadingState.classList.add('hidden');
                            manualState.classList.remove('hidden');
                        }, 500);
                    }
                }, 1000);
            }, 500);
        }

        // Show manual entry
        window.showManual = function() {
            loadingState.classList.add('hidden');
            manualState.classList.remove('hidden');
        };

        // Load manual code
        window.loadManual = function() {
            const code = document.getElementById('session-code').value.trim();
            if (code) {
                manualState.classList.add('hidden');
                loadingState.classList.remove('hidden');
                setProgress(30, 'Loading manual code...');
                loadSession(code);
            }
        };

        // Start loading if we have a session ID
        if (sessionId) {
            loadSession(sessionId);
        } else {
            showManual();
        }
    </script>
</body>
</html>
